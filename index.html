<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bubble Canvas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0c29;
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
      font-family: system-ui, sans-serif;
      color: #fff;
    }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: rgba(0,0,0,0.4);
      z-index: 10;
      font-size: 0.85rem;
    }

    #my-color {
      width: 12px; height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    #status { color: rgba(255,255,255,0.4); font-size: 0.75rem; }

    canvas {
      position: fixed;
      top: 40px; left: 0;
      width: 100%;
      height: calc(100dvh - 40px);
    }

    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
      transition: opacity 1s;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="hud">
  <div><span id="my-color"></span><span id="my-label">You</span></div>
  <div id="bubble-count">0 bubbles</div>
  <div id="status">connecting…</div>
</div>

<canvas id="c"></canvas>
<div id="hint">tap to create &middot; tap a bubble to pop it</div>

<script type="module">
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, remove,
         onChildAdded, onChildRemoved }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase ──────────────────────────────────────────────────
const app = initializeApp({
  apiKey:            "AIzaSyDahtsY5sPrO6DK69KzhdYO9zqmqfMBsKM",
  authDomain:        "train-scratch-1.firebaseapp.com",
  databaseURL:       "https://train-scratch-1-default-rtdb.firebaseio.com",
  projectId:         "train-scratch-1",
  storageBucket:     "train-scratch-1.firebasestorage.app",
  messagingSenderId: "625819447256",
  appId:             "1:625819447256:web:cee18c3b98e9a9245c8cad",
});
const db = getDatabase(app);

// ── Session identity ──────────────────────────────────────────
let sessionId = sessionStorage.getItem('bub-sid');
if (!sessionId) {
  sessionId = Math.random().toString(36).slice(2);
  sessionStorage.setItem('bub-sid', sessionId);
}

let myHue = parseInt(sessionStorage.getItem('bub-hue'));
if (isNaN(myHue)) {
  myHue = Math.floor(Math.random() * 360);
  sessionStorage.setItem('bub-hue', myHue);
}

// ── HUD ───────────────────────────────────────────────────────
const myColorEl     = document.getElementById('my-color');
const bubbleCountEl = document.getElementById('bubble-count');
const statusEl      = document.getElementById('status');
const hintEl        = document.getElementById('hint');

myColorEl.style.background = `hsl(${myHue}, 80%, 65%)`;

// ── Canvas ────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Bubble state ──────────────────────────────────────────────
const bubbles = new Map(); // Firebase key → bubble object
const EMOJIS  = ['🫧','💜','⭐','🔵','🟣','💫','🌀','✨','🎈','🌸'];

function hueColors(hue) {
  return {
    inner: `hsl(${hue}, 70%, 75%)`,
    outer: `hsl(${hue}, 80%, 45%)`,
    glow:  `hsl(${hue}, 80%, 55%)`,
  };
}

// ── Firebase listeners ────────────────────────────────────────
const bubblesRef = ref(db, 'bubbles');

onChildAdded(bubblesRef, snap => {
  bubbles.set(snap.key, {
    ...snap.val(),
    colors:  hueColors(snap.val().hue),
    addedAt: performance.now(),
    dying:   false,
    dyingAt: 0,
  });
  updateCount();
  statusEl.textContent = 'connected';
});

onChildRemoved(bubblesRef, snap => {
  const b = bubbles.get(snap.key);
  if (!b) return;
  b.dying   = true;
  b.dyingAt = performance.now();
  setTimeout(() => { bubbles.delete(snap.key); updateCount(); }, 220);
});

function updateCount() {
  const n = bubbles.size;
  bubbleCountEl.textContent = `${n} bubble${n !== 1 ? 's' : ''}`;
}

// ── Interaction ───────────────────────────────────────────────
let hintGone = false;

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (!hintGone) { hintEl.style.opacity = '0'; hintGone = true; }

  const rect = canvas.getBoundingClientRect();
  const tx = e.clientX - rect.left;
  const ty = e.clientY - rect.top;

  // Tap existing bubble → pop it
  for (const [key, b] of [...bubbles.entries()].reverse()) {
    if (b.dying) continue;
    const dx = tx - b.x, dy = ty - b.y;
    if (dx*dx + dy*dy <= b.r*b.r) {
      remove(ref(db, `bubbles/${key}`));
      return;
    }
  }

  // Tap empty space → create bubble
  push(bubblesRef, {
    x:         tx,
    y:         ty,
    r:         Math.round(24 + Math.random() * 24),
    hue:       myHue,
    ownerId:   sessionId,
    emoji:     EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
    createdAt: Date.now(),
  });
});

// ── Render loop ───────────────────────────────────────────────
function draw(now) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (const b of bubbles.values()) {
    const scale = b.dying
      ? Math.max(0, 1 - (now - b.dyingAt) / 200)
      : Math.min(1, (now - b.addedAt) / 150);

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.scale(scale, scale);

    // Glow ring on your own bubbles
    if (b.ownerId === sessionId) {
      ctx.beginPath();
      ctx.arc(0, 0, b.r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${b.hue}, 80%, 70%, 0.5)`;
      ctx.lineWidth   = 2;
      ctx.stroke();
    }

    // Fill
    const g = ctx.createRadialGradient(-b.r * 0.2, -b.r * 0.2, 0, 0, 0, b.r);
    g.addColorStop(0, b.colors.inner);
    g.addColorStop(1, b.colors.outer);

    ctx.beginPath();
    ctx.arc(0, 0, b.r, 0, Math.PI * 2);
    ctx.fillStyle   = g;
    ctx.shadowColor = b.colors.glow;
    ctx.shadowBlur  = b.r / 2;
    ctx.fill();
    ctx.shadowBlur  = 0;

    // Emoji
    ctx.font         = `${Math.round(b.r * 0.9)}px serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.emoji, 0, 0);

    ctx.restore();
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
